<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Gestión Operativa - Compañía de Bomberos Chosica N° 32</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
  <header class="encabezado">
    <div class="marca"><span aria-hidden="true">🚒</span><div><strong>SISTEMA DE GESTIÓN OPERATIVA</strong><small>COMPAÑÍA DE BOMBEROS CHOSICA N° 32</small></div></div>
    {% if session.codigo %}<form method="post" action="{{ url_for('cerrar_sesion') }}"><button class="salir">Cerrar sesión</button></form>{% endif %}
  </header>
  <main class="contenedor">
    {% with mensajes = get_flashed_messages(with_categories=true) %}
      {% for categoria, mensaje in mensajes %}<div class="mensaje {{ categoria }}">{{ mensaje }}</div>{% endfor %}
    {% endwith %}
    {% block contenido %}{% endblock %}
  </main>
</body>
</html>
